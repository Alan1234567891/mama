<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Милены 🌸</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: #fff0f3;
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
        }

        .card-container {
            position: relative;
            width: 450px;
            height: 700px; /* Немного увеличил высоту для кнопки */
            perspective: 1500px;
            z-index: 100;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            text-align: center;
        }

        .card.open {
            transform: rotateY(180deg);
        }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 50px;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 20px 80px rgba(255, 20, 147, 0.4);
            border: 10px solid #ffb7c5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .back {
            transform: rotateY(180deg);
            background: #fffafa;
        }

        .name { font-weight: bold; color: #ff0055; font-size: 3.5rem; }
        
        .photo-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 15px; margin: 20px 0;
            width: 100%;
        }

        .photo-grid img {
            width: 100%; height: 160px;
            object-fit: cover; border-radius: 25px;
            border: 4px solid #ffb7c5;
        }

        /* Кнопка ТЫКНИ */
        .btn-click {
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white; border: none; padding: 18px 45px;
            border-radius: 60px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
        }

        /* НОВАЯ КНОПКА СЮРПРИЗ */
        .btn-next {
            display: inline-block;
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            border: 2px solid white;
            animation: pulse-button 2s infinite; /* Анимация пульсации */
            transition: 0.3s;
        }

        .btn-next:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        @keyframes pulse-button {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .congrats-title { color: #ff0055; font-size: 2.8rem; margin: 0; }
        
        .congrats-text {
            color: #d4418e;
            font-size: 1.3rem;
            line-height: 1.4;
            font-style: italic;
            margin: 10px 0;
        }

        .falling {
            position: absolute; pointer-events: none; z-index: 150;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card" id="mainCard">
            <!-- ПЕРЕДНЯЯ СТОРОНА -->
            <div class="front">
                <span style="font-size: 50px;">💐✨💐</span>
                <span class="name">Милене</span>
                
                <div class="photo-grid">
                    <img src="image/милена1.jpg" alt="1">
                    <img src="image/милена2.jpg" alt="2">
                    <img src="image/милена3.jpg" alt="3">
                    <img src="image/милена4.jpg" alt="4">
                </div>

                <button class="btn-click" onclick="openCard()">Тыкни</button>
            </div>

            <!-- ЗАДНЯЯ СТОРОНА -->
            <div class="back">
                <h1 class="congrats-title">С 8 Марта! 🌸</h1>
                <div class="congrats-text">
                    Милена, пусть твоя улыбка <br> 
                    радует меня и дальше, <br>		
                    приносит море тепла. <br>
                    И пусть этот день приносит радость, и<br>
                    самые яркие события! <br><br>
                    Оставайся такой же <br>
                    чудесной и неповторимой!<br>
                    Я люблю тебя моя принцесса.
                </div>
                
                <!-- Теперь это полноценная кнопка -->
                <a href="html/1.html" class="btn-next">Сюрприз от котика 🐾</a>
            </div>
        </div>
    </div>

    <script>
        const flowerList = ['🌸', '🌷', '🌹', '🌺', '💖', '✨', '🌼'];

        function openCard() {
            document.getElementById('mainCard').classList.add('open');
            
            setInterval(() => {
                const item = document.createElement('div');
                item.classList.add('falling');
                item.innerText = flowerList[Math.floor(Math.random() * flowerList.length)];
                item.style.left = Math.random() * 100 + 'vw';
                item.style.fontSize = Math.random() * 40 + 20 + 'px';
                item.style.animationDuration = Math.random() * 2 + 1.5 + 's';
                document.body.appendChild(item);
                setTimeout(() => item.remove(), 3500);
            }, 50);
        }
    </script>
</body>
</html>
